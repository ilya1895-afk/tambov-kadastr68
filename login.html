<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Тамбов Кадастр</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%234a6b5f' d='M16 2L30 16 16 30 2 16z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__inner">
        <div class="logo">
          <span class="logo__icon">◆</span>
          <span class="logo__text">Тамбов Кадастр</span>
        </div>
        <nav class="nav" aria-label="Навигация">
          <a class="nav__tab" href="index.html">Главная</a>
          <a class="nav__tab" href="login.html">Вход</a>
        </nav>
        <div class="header__user">
          <span class="header__name">Гость</span>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="panel panel--active">
        <div class="login">
          <div class="login__card">
            <h1 class="login__title">Вход в личный кабинет</h1>
            <p class="login__subtitle">Выберите сотрудника — логин и пароль заполнятся автоматически.</p>

            <form class="login__form" id="login-form" novalidate>
              <div class="form-group">
                <label class="form-group__label" for="login-user">Сотрудник</label>
                <select class="form-group__input" id="login-user" name="user" required></select>
              </div>

              <div class="form-group">
                <label class="form-group__label" for="login-username">Логин</label>
                <input type="text" class="form-group__input" id="login-username" name="username" autocomplete="username" required>
              </div>

              <div class="form-group">
                <label class="form-group__label" for="login-password">Пароль</label>
                <input type="password" class="form-group__input" id="login-password" name="password" autocomplete="current-password" required>
                <span class="form-group__error" id="login-error" role="alert"></span>
              </div>

              <div class="login__actions">
                <button type="submit" class="btn btn--primary">Войти</button>
                <a class="btn btn--ghost-dark" href="index.html">На главную</a>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <span>© Тамбов Кадастр. Личный кабинет сотрудника.</span>
      </div>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
